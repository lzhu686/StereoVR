<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Monitor</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
    .header { background: #16213e; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #0f3460; }
    .header h1 { font-size: 18px; color: #e94560; }
    .header .subtitle { font-size: 12px; color: #8899aa; margin-left: 10px; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
    .status-dot.connected { background: #4caf50; }
    .status-dot.switching { background: #ff9800; animation: pulse 0.8s infinite; }
    @keyframes pulse { 50% { opacity: 0.3; } }

    .main { display: grid; grid-template-columns: 1fr 340px; gap: 16px; padding: 16px; height: calc(100vh - 56px); }
    .preview-section { display: flex; flex-direction: column; gap: 10px; }
    .preview-container { flex: 1; background: #0d1117; border-radius: 8px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
    .preview-container canvas { max-width: 100%; max-height: 100%; }
    .overlay { position: absolute; padding: 4px 10px; border-radius: 4px; font-size: 12px; background: rgba(0,0,0,0.6); }
    .overlay.tl { top: 8px; left: 8px; color: #aaa; }
    .overlay.tr { top: 8px; right: 8px; color: #4caf50; font-weight: bold; font-size: 13px; }

    .view-toggle { display: flex; border: 1px solid #0f3460; border-radius: 6px; overflow: hidden; }
    .view-toggle button { flex: 1; padding: 7px; border: none; background: transparent; color: #8899aa; font-size: 12px; cursor: pointer; }
    .view-toggle button.active { background: #0f3460; color: #fff; }

    .panel { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .card { background: #16213e; border-radius: 8px; padding: 14px; border: 1px solid #0f3460; }
    .card h3 { font-size: 13px; color: #e94560; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .info-grid { display: grid; grid-template-columns: auto 1fr; gap: 5px 12px; font-size: 13px; }
    .info-grid .label { color: #8899aa; }
    .info-grid .value { color: #fff; font-weight: 600; text-align: right; }
    .info-grid .value.hl { color: #e94560; font-size: 15px; }

    .mode-section { display: flex; flex-direction: column; gap: 8px; }
    .mode-label { font-size: 11px; color: #8899aa; margin-bottom: 2px; }
    .mode-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .mode-btn { padding: 7px 10px; border: 2px solid #0f3460; border-radius: 6px; background: transparent; color: #8899aa; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; min-width: 70px; }
    .mode-btn:hover { border-color: #e94560; color: #fff; }
    .mode-btn.active { border-color: #e94560; background: rgba(233,69,96,0.15); color: #e94560; }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input[type=range] { flex: 1; accent-color: #e94560; }
    .slider-row .val { min-width: 36px; text-align: right; font-weight: 600; font-size: 13px; }

    .action-group { display: flex; gap: 6px; }
    .action-btn { flex: 1; padding: 9px; border: 1px solid #0f3460; border-radius: 6px; background: #0f3460; color: #e0e0e0; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .action-btn:hover { background: #1a4a8a; }

    select.model-select { width: 100%; padding: 8px; border: 2px solid #0f3460; border-radius: 6px; background: #0d1117; color: #e0e0e0; font-size: 13px; cursor: pointer; }
    select.model-select:focus { border-color: #e94560; outline: none; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge.ok  { background: rgba(76,175,80,0.2);  color: #4caf50; }
    .badge.warn{ background: rgba(255,152,0,0.2);  color: #ff9800; }
    .hidden { display: none !important; }
</style>
</head>
<body>
<div class="header">
    <div style="display:flex;align-items:center;">
        <h1 id="headerTitle">Camera Monitor</h1>
        <span class="subtitle" id="headerSub"></span>
    </div>
    <div class="status"><div class="status-dot" id="statusDot"></div><span id="statusText">Disconnected</span></div>
</div>
<div class="main">
    <div class="preview-section">
        <div class="preview-container">
            <canvas id="canvas"></canvas>
            <div class="overlay tl" id="label">No Signal</div>
            <div class="overlay tr" id="fpsOvl">-- FPS</div>
        </div>
        <div class="view-toggle" id="viewToggle">
            <button class="active" onclick="setView('stereo')">Stereo (L+R)</button>
            <button onclick="setView('left')">Left Only</button>
            <button onclick="setView('right')">Right Only</button>
        </div>
    </div>
    <div class="panel">
        <!-- Camera Info -->
        <div class="card" id="cameraCard"></div>
        <!-- FOV -->
        <div class="card">
            <h3>Field of View</h3>
            <div class="info-grid" id="fovGrid">
                <span class="label">H-FOV</span><span class="value hl" id="hfov">--</span>
                <span class="label">V-FOV</span><span class="value hl" id="vfov">--</span>
                <span class="label">D-FOV</span><span class="value hl" id="dfov">--</span>
            </div>
        </div>
        <!-- Live Stats -->
        <div class="card">
            <h3>Live Stats</h3>
            <div class="info-grid">
                <span class="label">Resolution</span><span class="value" id="sRes">--</span>
                <span class="label">FPS (capture)</span><span class="value" id="sFps">--</span>
                <span class="label">FPS (display)</span><span class="value" id="sDFps">--</span>
                <span class="label">Encode Time</span><span class="value" id="sEnc">--</span>
                <span class="label">Frame Size</span><span class="value" id="sSz">--</span>
            </div>
        </div>
        <!-- Resolution / FPS -->
        <div class="card">
            <h3>Resolution / FPS</h3>
            <div class="mode-section">
                <div>
                    <div class="mode-label">Resolution</div>
                    <div class="mode-row" id="resRow"></div>
                </div>
                <div>
                    <div class="mode-label">Frame Rate</div>
                    <div class="mode-row" id="fpsRow"></div>
                </div>
            </div>
        </div>
        <!-- Quality -->
        <div class="card">
            <h3>JPEG Quality</h3>
            <div class="slider-row">
                <input type="range" id="qSlider" min="10" max="100" value="95" oninput="setQuality(this.value)">
                <span class="val" id="qVal">95%</span>
            </div>
        </div>
        <!-- Actions -->
        <div class="card">
            <h3>Actions</h3>
            <div class="action-group">
                <button class="action-btn" onclick="snapshot()">Save Snapshot</button>
            </div>
        </div>
    </div>
</div>
<script>
/* ===== State ===== */
let availModes = {};
let ws = null, viewMode = 'stereo', canvas, ctx;
let leftImg = new Image(), rightImg = new Image(), leftOk = false, rightOk = false;
let dFpsCnt = 0, dFpsT = performance.now(), dFps = 0, reconTimer = null;
let curRes = '', curFps = 0;
let camType = '';  // 'single' | 'stereo'

/* ===== Init ===== */
window.addEventListener('DOMContentLoaded', () => {
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    connect();
});

/* ===== Camera type detection & UI adaptation ===== */
function detectType(d) {
    const m = (d.model || '').toLowerCase();
    // Single-camera (non-stereo): Orbbec, RealSense, etc.
    if (m.includes('gemini') || m.includes('orbbec') || m.includes('realsense') || m.includes('d405')) return 'single';
    return 'stereo';
}

function applyLayout(type, d) {
    // Always update title with actual model name
    const model = (d.model || 'Camera').replace(/^Test Mode \(/, '').replace(/\)$/, '');
    document.getElementById('headerTitle').textContent = model + ' Monitor';

    if (type === camType) return;
    camType = type;

    const toggle = document.getElementById('viewToggle');
    const btns = toggle.querySelectorAll('button');
    if (type === 'single') {
        document.getElementById('headerSub').textContent = 'RGB Preview';
        btns[0].textContent = 'Full Frame';
        btns[1].textContent = 'Left Half';
        btns[2].textContent = 'Right Half';
    } else {
        document.getElementById('headerSub').textContent = 'Stereo Preview';
        btns[0].textContent = 'Stereo (L+R)';
        btns[1].textContent = 'Left Only';
        btns[2].textContent = 'Right Only';
    }
}

function buildCameraCard(d) {
    const card = document.getElementById('cameraCard');
    let rows = `
        <span class="label">Model</span><span class="value">${d.model || '--'}</span>`;
    if (d.baseline) rows += `
        <span class="label">Baseline</span><span class="value">${d.baseline} mm</span>`;
    rows += `
        <span class="label">Sensor</span><span class="value">${d.sensor || '--'}</span>`;
    if (d.shutter) rows += `
        <span class="label">Shutter</span><span class="value">${d.shutter}</span>`;
    card.innerHTML = `<h3>Camera</h3><div class="info-grid">${rows}</div>`;
}

/* ===== Resolution / FPS buttons ===== */
function buildResButtons() {
    const row = document.getElementById('resRow');
    row.innerHTML = '';
    for (const res of Object.keys(availModes)) {
        const b = document.createElement('button');
        b.className = 'mode-btn' + (res === curRes ? ' active' : '');
        b.dataset.res = res;
        b.textContent = res;
        b.onclick = () => selectRes(res);
        row.appendChild(b);
    }
}

function renderFps(res, active) {
    const row = document.getElementById('fpsRow');
    const list = availModes[res] || [];
    row.innerHTML = '';
    list.forEach(f => {
        const b = document.createElement('button');
        b.className = 'mode-btn' + (f === active ? ' active' : '');
        b.textContent = f + ' fps';
        b.onclick = () => selectFps(f);
        row.appendChild(b);
    });
}

/* ===== WebSocket ===== */
function connect() {
    const p = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${p}//${location.hostname}:8767`);
    ws.onopen = () => {
        setStatus('connected', 'Connected');
        if (reconTimer) { clearTimeout(reconTimer); reconTimer = null; }
    };
    ws.onclose = () => {
        setStatus('', 'Disconnected');
        if (!reconTimer) reconTimer = setTimeout(() => { reconTimer = null; connect(); }, 2000);
    };
    ws.onerror = () => setStatus('', 'Error');
    ws.onmessage = e => {
        const m = JSON.parse(e.data);
        if (m.type === 'camera_info' || m.type === 'mode_changed') updateInfo(m.data);
        else if (m.type === 'frame') renderFrame(m);
        else if (m.type === 'switching') setStatus('switching', `Switching to ${m.resolution}@${m.fps}fps...`);
        else if (m.type === 'snapshot_result') alert(m.data ? 'Saved:\n' + m.data.stereo + '\n' + m.data.left + '\n' + m.data.right : 'Snapshot failed');
    };
}

function setStatus(s, t) {
    document.getElementById('statusDot').className = 'status-dot' + (s ? ' ' + s : '');
    document.getElementById('statusText').textContent = t;
}

/* ===== Update info from backend ===== */
function updateInfo(d) {
    const type = detectType(d);
    applyLayout(type, d);
    buildCameraCard(d);

    // FOV
    document.getElementById('hfov').textContent = d.h_fov ? d.h_fov + '\u00B0' : 'N/A';
    document.getElementById('vfov').textContent = d.v_fov ? d.v_fov + '\u00B0' : 'N/A';
    document.getElementById('dfov').textContent = d.d_fov ? d.d_fov + '\u00B0' : 'N/A';

    // Resolution
    document.getElementById('sRes').textContent = d.width && d.height ? d.width + 'x' + d.height : '--';

    // Modes
    if (d.available_modes) {
        availModes = d.available_modes;
        buildResButtons();
    }
    if (d.resolution) curRes = d.resolution;
    if (d.fps_target) curFps = d.fps_target;
    document.querySelectorAll('#resRow .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.res === curRes));
    renderFps(curRes, curFps);

    // Overlay label
    document.getElementById('label').textContent = `${d.model || 'Camera'} | ${curRes} @${curFps}fps`;
    setStatus('connected', 'Connected');
}

/* ===== Frame rendering ===== */
function renderFrame(m) {
    const s = m.stats || {};
    document.getElementById('sFps').textContent = (s.fps_actual || 0) + ' fps';
    document.getElementById('sEnc').textContent = (s.encode_ms || 0) + ' ms';
    document.getElementById('sSz').textContent = (s.size_kb || 0) + ' KB';
    document.getElementById('sRes').textContent = s.width && s.height ? s.width + 'x' + s.height : '--';
    dFpsCnt++;
    const n = performance.now();
    if (n - dFpsT >= 1000) {
        dFps = Math.round(dFpsCnt * 1000 / (n - dFpsT));
        dFpsCnt = 0;
        dFpsT = n;
        document.getElementById('fpsOvl').textContent = dFps + ' FPS';
        document.getElementById('sDFps').textContent = dFps + ' fps';
    }
    leftOk = rightOk = false;
    leftImg.onload = () => { leftOk = true; draw(); };
    rightImg.onload = () => { rightOk = true; draw(); };
    leftImg.src = 'data:image/jpeg;base64,' + m.left;
    rightImg.src = 'data:image/jpeg;base64,' + m.right;
}

function draw() {
    if (viewMode === 'stereo') {
        if (!leftOk || !rightOk) return;
        canvas.width = leftImg.width + rightImg.width;
        canvas.height = Math.max(leftImg.height, rightImg.height);
        ctx.drawImage(leftImg, 0, 0);
        ctx.drawImage(rightImg, leftImg.width, 0);
    } else if (viewMode === 'left') {
        if (!leftOk) return;
        canvas.width = leftImg.width;
        canvas.height = leftImg.height;
        ctx.drawImage(leftImg, 0, 0);
    } else {
        if (!rightOk) return;
        canvas.width = rightImg.width;
        canvas.height = rightImg.height;
        ctx.drawImage(rightImg, 0, 0);
    }
}

/* ===== Controls ===== */
function setView(m) {
    viewMode = m;
    document.querySelectorAll('.view-toggle button').forEach((b, i) =>
        b.classList.toggle('active', ['stereo', 'left', 'right'][i] === m)
    );
}

function selectRes(r) {
    curRes = r;
    const fl = availModes[r] || [];
    curFps = fl[0] || 15;
    document.querySelectorAll('#resRow .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.res === r));
    renderFps(r, curFps);
    sendSwitch(r, curFps);
}

function selectFps(f) {
    curFps = f;
    renderFps(curRes, f);
    sendSwitch(curRes, f);
}

function sendSwitch(r, f) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'switch_mode', resolution: r, fps: f }));
}

function setQuality(v) {
    document.getElementById('qVal').textContent = v + '%';
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'set_quality', quality: +v }));
}

function snapshot() {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'snapshot' }));
}

function changeModel(m) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'set_camera_model', model: m }));
}
</script>
</body>
</html>
